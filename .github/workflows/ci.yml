name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Type check (mypy)
        run: uv run mypy sbgn_pd_adapter
        continue-on-error: true  # advisory until we tighten annotations

      - name: Test (pytest)
        run: uv run pytest -v --tb=short

      - name: Smoke-test end-to-end pipeline (no BioCypher output)
        run: uv run python create_knowledge_graph.py --no-biocypher

      - name: End-to-end with BioCypher
        run: uv run python create_knowledge_graph.py
