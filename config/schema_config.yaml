# BioCypher schema configuration for the SBGN-PD adapter.
#
# Every top-level key is a Biolink category or predicate that the KG will
# contain. `is_a` walks the Biolink hierarchy so downstream queries can search
# by superclass (BiologicalEntity finds everything, MacromolecularMachineMixin
# finds proteins and RNA products, etc.).
#
# The `input_label` values must match exactly the labels the adapter's
# get_nodes() and get_edges() emit. If you rename a category here, also update
# biolink_mapper.GLYPH_TO_BIOLINK / ARC_TO_BIOLINK.

# -------------------------------------------------------------------- nodes

biological entity:
  represented_as: node
  input_label: biolink:BiologicalEntity
  is_a: named thing
  preferred_id: id
  properties:
    label: str
    sbgn_glyph_class: str
    compartment: str
    parent_id: str
    source_file: str
    annotations: str
    merged_from: str

macromolecular machine mixin:
  represented_as: node
  input_label: biolink:MacromolecularMachineMixin
  is_a: biological entity
  preferred_id: id
  properties:
    label: str
    sbgn_glyph_class: str
    compartment: str
    parent_id: str
    source_file: str
    annotations: str
    merged_from: str

small molecule:
  represented_as: node
  input_label: biolink:SmallMolecule
  is_a: molecular entity
  preferred_id: id
  properties:
    label: str
    sbgn_glyph_class: str
    compartment: str
    parent_id: str
    source_file: str
    annotations: str
    merged_from: str

chemical mixture:
  represented_as: node
  input_label: biolink:ChemicalMixture
  is_a: molecular entity
  preferred_id: id
  properties:
    label: str
    sbgn_glyph_class: str
    compartment: str
    source_file: str

nucleic acid entity:
  represented_as: node
  input_label: biolink:NucleicAcidEntity
  is_a: molecular entity
  preferred_id: id
  properties:
    label: str
    sbgn_glyph_class: str
