    annotations: str
    merged_from: str

macromolecular complex:
  represented_as: node
  input_label: biolink:MacromolecularComplex
  is_a: macromolecular machine mixin
  preferred_id: id
  properties:
    label: str
    sbgn_glyph_class: str
    compartment: str
    parent_id: str
    source_file: str
    annotations: str
    merged_from: str

chemical or drug or treatment:
  represented_as: node
  input_label: biolink:ChemicalOrDrugOrTreatment
  is_a: biological entity
  preferred_id: id
  properties:
    label: str
    sbgn_glyph_class: str
    source_file: str

biological process:
  represented_as: node
  input_label: biolink:BiologicalProcess
  is_a: biological process or activity
  preferred_id: id
  properties:
    label: str
    sbgn_glyph_class: str
    compartment: str
    source_file: str
    is_reified_process: bool

phenotypic feature:
