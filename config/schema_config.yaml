    sbgn_glyph_class: str
    source_file: str

# ------------------------------------------------------------------- edges

has input:
  represented_as: edge
  input_label: biolink:has_input
  is_a: related to
  source: molecular entity
  target: biological process
  properties:
    sbgn_arc_class: str
    source_file: str

has output:
  represented_as: edge
  input_label: biolink:has_output
  is_a: related to
  source: biological process
  target: molecular entity
  properties:
    sbgn_arc_class: str
    source_file: str

catalyzes:
  represented_as: edge
  input_label: biolink:catalyzes
  is_a: related to
  source: macromolecular machine mixin
  target: biological process
  properties:
    sbgn_arc_class: str
    source_file: str

regulates:
  represented_as: edge
  input_label: biolink:regulates
  is_a: related to
  source: biological entity
  target: biological process
  properties:
    sbgn_arc_class: str
    source_file: str

positively regulates:
  represented_as: edge
  input_label: biolink:positively_regulates
  is_a: regulates
  source: biological entity
  target: biological process
  properties:
    sbgn_arc_class: str
    source_file: str
    necessary: bool

negatively regulates:
  represented_as: edge
  input_label: biolink:negatively_regulates
  is_a: regulates
  source: biological entity
  target: biological process
  properties:
    sbgn_arc_class: str
    source_file: str

same as:
  represented_as: edge
  input_label: biolink:same_as
  is_a: related to
  source: biological entity
  target: biological entity
  properties:
    sbgn_arc_class: str
    source_file: str
